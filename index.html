<!doctype html>
<meta charset="utf-8">
<title>City Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --paper: #f4ecdd;
    --paper-deep: #e6d8bc;
    --ink: #17130f;
    --muted: #6f665d;
    --line: rgba(23, 19, 15, 0.12);
    --panel: rgba(255,255,255,0.76);
    --accent: #c44e2b;
    --accent-soft: rgba(196,78,43,0.12);
    --shadow: 0 18px 42px rgba(74, 56, 37, 0.12);
    --display: Georgia, "Times New Roman", serif;
    --body: "Avenir Next", "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    color: var(--ink);
    font-family: var(--body);
    background:
      radial-gradient(circle at top left, rgba(196,78,43,0.14), transparent 24%),
      radial-gradient(circle at 85% 10%, rgba(88,102,71,0.12), transparent 22%),
      linear-gradient(180deg, #f7f0e2 0%, var(--paper) 54%, var(--paper-deep) 100%);
  }
  a { color: inherit; text-decoration: none; }
  .page {
    width: min(1480px, calc(100% - 28px));
    margin: 0 auto;
    padding: 22px 0 40px;
  }
  .hero {
    padding: 26px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(28,22,17,0.98), rgba(82,44,27,0.94) 48%, rgba(125,57,32,0.9) 100%);
    color: #fff9f2;
    box-shadow: var(--shadow);
  }
  .eyebrow {
    display: inline-flex;
    padding: 8px 12px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .hero h1 {
    margin: 14px 0 0;
    font: 700 clamp(40px, 6vw, 70px)/0.94 var(--display);
    letter-spacing: -0.05em;
  }
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 20px;
  }
  .metric {
    padding: 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .metric-label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,249,242,0.72);
  }
  .metric-value {
    display: block;
    margin-top: 6px;
    font-size: clamp(24px, 3vw, 34px);
    font-weight: 700;
  }
  .controls {
    margin-top: 18px;
    padding: 18px;
    border-radius: 28px;
    background: rgba(255,255,255,0.58);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 10px 28px rgba(86, 63, 42, 0.08);
  }
  .toolbar {
    display: grid;
    grid-template-columns: 1.6fr repeat(3, minmax(160px, 1fr)) auto;
    gap: 12px;
    align-items: end;
  }
  .field {
    display: grid;
    gap: 6px;
  }
  .field span {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  input, select, button {
    width: 100%;
    padding: 13px 14px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.82);
    color: var(--ink);
    font: inherit;
  }
  button {
    width: auto;
    background: var(--accent);
    color: white;
    border-color: transparent;
    font-weight: 700;
    cursor: pointer;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .summary-card {
    padding: 16px 18px;
    border-radius: 18px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.66);
    box-shadow: 0 10px 24px rgba(82, 62, 42, 0.08);
  }
  .summary-card strong {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--muted);
  }
  .summary-card span {
    display: block;
    font-size: 24px;
    font-weight: 700;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin-top: 20px;
  }
  .panel {
    display: grid;
    gap: 12px;
    padding: 18px;
    border-radius: 22px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.66);
    box-shadow: 0 14px 34px rgba(82, 62, 42, 0.1);
  }
  .panel-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .panel h2 {
    margin: 0;
    font: 700 24px/1.08 var(--display);
    letter-spacing: -0.03em;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
  }
  .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }
  .story-list {
    margin: 0;
    padding-left: 20px;
    display: grid;
    gap: 10px;
  }
  .story-list li {
    line-height: 1.45;
    color: var(--muted);
  }
  .story-list a {
    color: var(--ink);
  }
  .empty {
    grid-column: 1 / -1;
    padding: 34px 22px;
    border-radius: 22px;
    background: rgba(255,255,255,0.72);
    border: 1px dashed rgba(23,19,15,0.18);
    text-align: center;
    color: var(--muted);
  }
  @media (max-width: 1180px) {
    .toolbar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 920px) {
    .metrics,
    .summary,
    .grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .page { width: min(100% - 18px, 1480px); }
    .hero, .controls { padding: 18px; }
    .toolbar { grid-template-columns: 1fr; }
    button { width: 100%; }
  }
</style>
<div class="page">
  <section class="hero">
    <div class="eyebrow">City Dashboard</div>
    <h1>City Dashboard</h1>
    <div class="metrics">
      <div class="metric">
        <span class="metric-label">Tracked Sources</span>
        <span class="metric-value" id="metricSources">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">Stories In Snapshot</span>
        <span class="metric-value" id="metricStories">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">Last Refresh</span>
        <span class="metric-value" id="metricRefresh">-</span>
      </div>
    </div>
  </section>

  <section class="controls">
    <div class="toolbar">
      <label class="field">
        <span>Search</span>
        <input id="search" placeholder="Search headlines...">
      </label>
      <label class="field">
        <span>City</span>
        <select id="citySelect"></select>
      </label>
      <label class="field">
        <span>Publisher</span>
        <select id="publisherSelect"></select>
      </label>
      <label class="field">
        <span>Sort</span>
        <select id="sort">
          <option value="rankAsc">Rank: low to high</option>
          <option value="rankDesc">Rank: high to low</option>
          <option value="alpha">Headline: A to Z</option>
        </select>
      </label>
      <button id="reload" type="button">Reset</button>
    </div>
    <div class="summary">
      <div class="summary-card">
        <strong>Visible Panels</strong>
        <span id="visibleCount">0</span>
      </div>
      <div class="summary-card">
        <strong>City</strong>
        <span id="activeCity">All</span>
      </div>
      <div class="summary-card">
        <strong>Publisher</strong>
        <span id="activePublisher">All</span>
      </div>
      <div class="summary-card">
        <strong>Search State</strong>
        <span id="searchState">Everything</span>
      </div>
    </div>
  </section>

  <main class="grid" id="grid"></main>
</div>

, "source": "Chandigarh • Tribune", "source_url": "https://www.tribuneindia.com/news/city/chandigarh", "rank": 36, "headline": "Assembly Elections 2026", "link": "https://www.tribuneindia.com/news/assembly-elections-2026", "collected_at_iso": "2026-05-11T04:03:46+00:00"}, {"city": "Chandigarh", "publisher": "Tribune", "source": "Chandigarh • Tribune", "source_url": "https://www.tribuneindia.com/news/city/chandigarh", "rank": 37, "headline": "Letters To The Editor", "link": "https://www.tribuneindia.com/news/opinions/letters", "collected_at_iso": "2026-05-11T04:03:46+00:00"}, {"city": "Chandigarh", "publisher": "Tribune", "source": "Chandigarh • Tribune", "source_url": "https://www.tribuneindia.com/news/city/chandigarh", "rank": 38, "headline": "India Pakistan News", "link": "https://www.tribuneindia.com/news/india-pakistan-news/", "collected_at_iso": "2026-05-11T04:03:46+00:00"}, {"city": "Chandigarh", "publisher": "Tribune", "source": "Chandigarh • Tribune", "source_url": "https://www.tribuneindia.com/news/city/chandigarh", "rank": 39, "headline": "Jobs & Careers", "link": "https://www.tribuneindia.com/news/jobscareers", "collected_at_iso": "2026-05-11T04:03:46+00:00"}, {"city": "Chandigarh", "publisher": "Tribune", "source": "Chandigarh • Tribune", "source_url": "https://www.tribuneindia.com/news/city/chandigarh", "rank": 40, "headline": "Science & Technology", "link": "https://www.tribuneindia.com/news/science-technology", "collected_at_iso": "2026-05-11T04:03:46+00:00"}, {"city": "Chandigarh", "publisher": "Tribune", "source": "Chandigarh • Tribune", "source_url": "https://www.tribuneindia.com/news/city/chandigarh", "rank": 41, "headline": "Remembering B N Goswamy", "link": "https://www.tribuneindia.com/news/remembering-bn-goswamy/", "collected_at_iso": "2026-05-11T04:03:46+00:00"}, {"city": "Chandigarh", "publisher": "Tribune", "source": "Chandigarh • Tribune", "source_url": "https://www.tribuneindia.com/news/city/chandigarh", "rank": 42, "headline": "Celebrating 145 years of The Tribune", "link": "https://www.tribuneindia.com/news/145-years-of-the-tribune/", "collected_at_iso": "2026-05-11T04:03:46+00:00"}];
const CITIES = [...new Set(RAW.map(d => d.city))];
const PUBLISHERS = [...new Set(RAW.map(d => d.publisher))];
const state = { raw: RAW, filterText: "", sortMode: "rankAsc", city: "All", publisher: "All" };

function asc(a, b) {
  return a < b ? -1 : a > b ? 1 : 0;
}

function formatStamp(value) {
  if (!value) return "-";
  const dt = new Date(value);
  if (Number.isNaN(dt.getTime())) return value;
  return dt.toLocaleString("en-IN", {
    day: "2-digit",
    month: "short",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function applyFilters(rows) {
  let result = rows.slice();
  if (state.city !== "All") {
    result = result.filter(d => d.city === state.city);
  }
  if (state.publisher !== "All") {
    result = result.filter(d => d.publisher === state.publisher);
  }
  if (state.filterText) {
    const q = state.filterText.toLowerCase();
    result = result.filter(d => (d.headline || "").toLowerCase().includes(q));
  }
  switch (state.sortMode) {
    case "rankAsc": result.sort((a, b) => a.rank - b.rank); break;
    case "rankDesc": result.sort((a, b) => b.rank - a.rank); break;
    case "alpha": result.sort((a, b) => asc(a.headline, b.headline)); break;
  }
  return result;
}

function bySource(rows) {
  const order = [...new Set(rows.map(row => row.source))];
  return order.map(source => ({
    source,
    rows: rows.filter(row => row.source === source)
  })).filter(group => group.rows.length);
}

function panelTemplate(group) {
  const top = group.rows[0];
  const items = group.rows.map(row => `
    <li><a href="${row.link}" target="_blank" rel="noopener">#${row.rank} ${row.headline}</a></li>
  `).join("");
  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <span class="badge">${top.city}</span>
          <h2><a href="${top.source_url || '#'}" target="_blank" rel="noopener">${top.publisher}</a></h2>
        </div>
        <div class="meta">
          <span>${group.rows.length} stories</span>
          <span>${formatStamp(top.collected_at_iso)}</span>
        </div>
      </div>
      <ol class="story-list">${items}</ol>
    </section>
  `;
}

function renderPanels(rows) {
  const root = document.querySelector("#grid");
  const groups = bySource(rows);
  if (!groups.length) {
    root.innerHTML = `<div class="empty">No sources match this filter yet. Try another city, publisher, or clear the search.</div>`;
    return;
  }
  root.innerHTML = groups.map(panelTemplate).join("");
}

function renderSummary(rows) {
  const groups = bySource(rows);
  document.querySelector("#visibleCount").textContent = String(groups.length);
  document.querySelector("#activeCity").textContent = state.city;
  document.querySelector("#activePublisher").textContent = state.publisher;
  document.querySelector("#searchState").textContent = state.filterText ? `“${state.filterText}”` : "Everything";
}

function renderHeroMetrics() {
  document.querySelector("#metricSources").textContent = String([...new Set(RAW.map(d => d.source))].length);
  document.querySelector("#metricStories").textContent = String(RAW.length);
  const latest = RAW.reduce((acc, row) => {
    const stamp = row.collected_at_iso || "";
    return stamp > acc ? stamp : acc;
  }, "");
  document.querySelector("#metricRefresh").textContent = formatStamp(latest);
}

function fillCitySelect() {
  document.querySelector("#citySelect").innerHTML =
    ["All", ...CITIES].map(city => `<option value="${city}">${city}</option>`).join("");
}

function fillPublisherSelect() {
  document.querySelector("#publisherSelect").innerHTML =
    ["All", ...PUBLISHERS].map(publisher => `<option value="${publisher}">${publisher}</option>`).join("");
}

function render() {
  const rows = applyFilters(state.raw);
  renderPanels(rows);
  renderSummary(rows);
}

document.querySelector("#search").addEventListener("input", ev => {
  state.filterText = ev.target.value || "";
  render();
});
document.querySelector("#citySelect").addEventListener("change", ev => {
  state.city = ev.target.value;
  render();
});
document.querySelector("#publisherSelect").addEventListener("change", ev => {
  state.publisher = ev.target.value;
  render();
});
document.querySelector("#sort").addEventListener("change", ev => {
  state.sortMode = ev.target.value;
  render();
});
document.querySelector("#reload").addEventListener("click", () => {
  state.filterText = "";
  state.sortMode = "rankAsc";
  state.city = "All";
  state.publisher = "All";
  document.querySelector("#search").value = "";
  document.querySelector("#citySelect").value = "All";
  document.querySelector("#publisherSelect").value = "All";
  document.querySelector("#sort").value = "rankAsc";
  render();
});

fillCitySelect();
fillPublisherSelect();
renderHeroMetrics();
render();
</script>
